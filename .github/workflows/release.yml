name: release

# Builds the dabba binary for every supported platform and attaches it to the
# GitHub Release for the pushed tag, with a SHA-256 checksum + a signed build
# provenance attestation per binary and an SBOM for the release. install.sh /
# install.ps1 fetch these assets and verify the checksum.
# Strict semver tags only (vX.Y.Z, no pre-release suffix) — matches the house
# convention used across spice-labs-inc repos.
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build and upload to (must already exist)
        required: true

permissions:
  contents: write
  id-token: write # keyless signing for the provenance attestation
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          # Native ARM runner — builds aarch64-linux directly instead of the slow
          # Docker-based `cross` fallback (~12min → ~2-3min). Free for public repos.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # musl linker for the static Linux builds — native on both x86_64 and arm64
      # (the arm64 build is now native, not the Docker `cross` path that bundled it).
      - name: Install musl tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      # Builds the binary, archives it as dabba-<target>.tar.gz (.zip on Windows),
      # generates a .sha256 checksum, and uploads both to the release for this tag.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: dabba
          target: ${{ matrix.target }}
          archive: dabba-$target
          checksum: sha256
          ref: refs/tags/${{ github.event.inputs.tag || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      # Signed SLSA build provenance for the binary (same mechanism the org's
      # action-attest-image uses for container images, here for the native binary).
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/${{ matrix.target }}/release/dabba*

  sbom:
    needs: build # the release exists once the builds have uploaded to it
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM (syft, SPDX)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft dir:. -o spdx-json > dabba.spdx.json
      - name: Upload SBOM to the release
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG" dabba.spdx.json --clobber
