name: release

# Builds the dabba binary for every supported platform and attaches it to the
# GitHub Release for the pushed tag, with a SHA-256 checksum + a signed build
# provenance attestation per binary and an SBOM for the release. install.sh /
# install.ps1 fetch these assets and verify the checksum.
# Strict semver tags only (vX.Y.Z, no pre-release suffix) — matches the house
# convention used across spice-labs-inc repos.
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build and upload to (must already exist)
        required: true

permissions:
  contents: write
  id-token: write # keyless signing for the provenance attestation
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # Builds the binary, archives it as dabba-<target>.tar.gz (.zip on Windows),
      # generates a .sha256 checksum, and uploads both to the release for this tag.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: dabba
          target: ${{ matrix.target }}
          archive: dabba-$target
          checksum: sha256
          ref: refs/tags/${{ github.event.inputs.tag || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      # Signed SLSA build provenance for the binary (same mechanism the org's
      # action-attest-image uses for container images, here for the native binary).
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/${{ matrix.target }}/release/dabba*

  # aarch64 Linux is built natively on an ARM runner. taiki-e routes musl targets
  # through `cross`, which is broken on ARM hosts (it tries to pull an x86_64
  # toolchain) — so build directly. dabba is pure Rust, so the musl target links
  # self-contained and static with no extra tooling.
  build-aarch64-linux:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --release --bin dabba --target aarch64-unknown-linux-musl
      - name: Package, checksum, and upload
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          name="dabba-aarch64-unknown-linux-musl"
          tar -C target/aarch64-unknown-linux-musl/release -czf "$name.tar.gz" dabba
          sha256sum "$name.tar.gz" > "$name.tar.gz.sha256"
          gh release upload "$TAG" "$name.tar.gz" "$name.tar.gz.sha256" --clobber
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/aarch64-unknown-linux-musl/release/dabba

  sbom:
    needs: [build, build-aarch64-linux] # the release exists once the builds have uploaded
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Generate SBOM (syft, SPDX)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft dir:. -o spdx-json > dabba.spdx.json
      - name: Upload SBOM to the release
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG" dabba.spdx.json --clobber
