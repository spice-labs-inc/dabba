# Reference local config — the tier-0 self-contained quickstart, one env per
# local substrate.
#   dabba up                 # the default env (kind)
#   dabba env minikube up    # a specific env
#   dabba ls                 # list envs
apiVersion: dabba.spicelabs.io/v1alpha1
kind: DabbaConfig
metadata:
  name: dabba
spec:
  domain: localtest.me # shared across envs
  tls:
    issuer: selfsigned
  defaultEnvironment: kind
  environments:
    - { name: kind, substrate: kind }
    - { name: k3d, substrate: k3d }
    - { name: minikube, substrate: minikube }
  observability:
    enabled: false # Vector -> OpenObserve (+ OTEL traces); opt-in, off by default
  useCases:
    - demo
